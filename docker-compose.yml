services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threatfeed}
      POSTGRES_USER: ${POSTGRES_USER:-threatfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threatfeed}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redispass}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
    command: ["sh", "-c", "scripts/db-migrate.sh"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-threatfeed}:${POSTGRES_PASSWORD:-threatfeed}@postgres:5432/${POSTGRES_DB:-threatfeed}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      REQUESTS_SKIP_TLS_VERIFY: ${REQUESTS_SKIP_TLS_VERIFY:-false}
      FEED_PROXY_URL_MWDB: ${FEED_PROXY_URL_MWDB:-}
      FEED_PROXY_URL_ABUSECH: ${FEED_PROXY_URL_ABUSECH:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    # image: ghcr.io/mkilijanek/ioc-service:${IMAGE_TAG:-latest}
    build:
      context: .
    environment:
      # Flask/Gunicorn
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-}
      CACHE_TTL: ${CACHE_TTL:-300}
      APP_PORT: ${APP_PORT:-8080}
      WORKERS: ${WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-true}
      RATE_LIMITS_ENABLED: ${RATE_LIMITS_ENABLED:-true}
      SYNC_JOB_MAX_RETRIES: ${SYNC_JOB_MAX_RETRIES:-3}
      SYNC_JOB_RETRY_BASE_DELAY_S: ${SYNC_JOB_RETRY_BASE_DELAY_S:-30}
      SYNC_JOB_RETRY_MAX_DELAY_S: ${SYNC_JOB_RETRY_MAX_DELAY_S:-900}
      AUDIT_INTEGRITY_VERIFY_INTERVAL_S: ${AUDIT_INTEGRITY_VERIFY_INTERVAL_S:-3600}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-6}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-4}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      CORRELATION_SNAPSHOT_ENABLED: ${CORRELATION_SNAPSHOT_ENABLED:-true}
      CORRELATION_SNAPSHOT_INTERVAL: ${CORRELATION_SNAPSHOT_INTERVAL:-60}
      CORRELATION_SNAPSHOT_MIN_SOURCES: ${CORRELATION_SNAPSHOT_MIN_SOURCES:-2}
      CORRELATION_SNAPSHOT_LIMIT: ${CORRELATION_SNAPSHOT_LIMIT:-1000}
      CORRELATION_SNAPSHOT_TYPES: ${CORRELATION_SNAPSHOT_TYPES:-all,domain,ip,url,hash,email}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      REQUESTS_SKIP_TLS_VERIFY: ${REQUESTS_SKIP_TLS_VERIFY:-false}
      FEED_PROXY_URL_MWDB: ${FEED_PROXY_URL_MWDB:-}
      FEED_PROXY_URL_ABUSECH: ${FEED_PROXY_URL_ABUSECH:-}

      # DB
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-threatfeed}:${POSTGRES_PASSWORD:-threatfeed}@postgres:5432/${POSTGRES_DB:-threatfeed}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0

      # Integrations
      CROWDSEC_API_KEY: ${CROWDSEC_API_KEY:-}
      CROWDSEC_LISTS: ${CROWDSEC_LISTS:-}
      MISP_URL: ${MISP_URL:-}
      MISP_API_KEY: ${MISP_API_KEY:-}
      MISP_VERIFY_SSL: ${MISP_VERIFY_SSL:-false}
      MISP_DAYS: ${MISP_DAYS:-7}
      MALWAREBAZAAR_SINCE_DATE: ${MALWAREBAZAAR_SINCE_DATE:-}
      ABUSECH_AUTH_KEY: ${ABUSECH_AUTH_KEY:-}
      THREATFOX_ENABLED: ${THREATFOX_ENABLED:-false}
      THREATFOX_API_URL: ${THREATFOX_API_URL:-https://threatfox-api.abuse.ch/api/v1/}
      THREATFOX_AUTH_KEY: ${THREATFOX_AUTH_KEY:-}
      THREATFOX_DAYS: ${THREATFOX_DAYS:-3}
      THREATFOX_LIMIT: ${THREATFOX_LIMIT:-1000}
      URLHAUS_ENABLED: ${URLHAUS_ENABLED:-false}
      URLHAUS_FEED_URL: ${URLHAUS_FEED_URL:-https://urlhaus.abuse.ch/downloads/text_online/}
      URLHAUS_LIMIT: ${URLHAUS_LIMIT:-10000}
      FEODOTRACKER_ENABLED: ${FEODOTRACKER_ENABLED:-false}
      FEODOTRACKER_FEED_URL: ${FEODOTRACKER_FEED_URL:-https://feodotracker.abuse.ch/downloads/ipblocklist.txt}
      FEODOTRACKER_LIMIT: ${FEODOTRACKER_LIMIT:-10000}
      YARAIFY_ENABLED: ${YARAIFY_ENABLED:-false}
      YARAIFY_API_URL: ${YARAIFY_API_URL:-https://yaraify-api.abuse.ch/api/v1/}
      YARAIFY_AUTH_KEY: ${YARAIFY_AUTH_KEY:-}
      YARAIFY_IDENTIFIER: ${YARAIFY_IDENTIFIER:-}
      YARAIFY_LOOKUP_HASHES: ${YARAIFY_LOOKUP_HASHES:-}
      YARAIFY_TASK_STATUS: ${YARAIFY_TASK_STATUS:-processed}
      YARAIFY_LIMIT: ${YARAIFY_LIMIT:-250}
      HUNTING_FPLIST_ENABLED: ${HUNTING_FPLIST_ENABLED:-false}
      HUNTING_API_URL: ${HUNTING_API_URL:-https://hunting-api.abuse.ch/api/v1/}
      HUNTING_AUTH_KEY: ${HUNTING_AUTH_KEY:-}
      HUNTING_FPLIST_FORMAT: ${HUNTING_FPLIST_FORMAT:-csv}
      HUNTING_FPLIST_LIMIT: ${HUNTING_FPLIST_LIMIT:-10000}
      ABUSECH_TIMEOUT_S: ${ABUSECH_TIMEOUT_S:-30}
      ABUSECH_RETRY_ATTEMPTS: ${ABUSECH_RETRY_ATTEMPTS:-4}
      ABUSECH_RETRY_BASE_DELAY_S: ${ABUSECH_RETRY_BASE_DELAY_S:-1}
      ABUSECH_CIRCUIT_FAIL_THRESHOLD: ${ABUSECH_CIRCUIT_FAIL_THRESHOLD:-3}
      ABUSECH_CIRCUIT_COOLDOWN_S: ${ABUSECH_CIRCUIT_COOLDOWN_S:-300}

      # Security
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      ADMIN_ROLE: ${ADMIN_ROLE:-admin}
      ADMIN_DANGEROUS_OPS: ${ADMIN_DANGEROUS_OPS:-false}
      EDGE_HTTPS_ENABLED: ${EDGE_HTTPS_ENABLED:-false}
    ports:
      - "${APP_HOST_BIND:-127.0.0.1}:${APP_HOST_PORT:-7005}:${APP_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${APP_PORT:-8080}/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    # image: ghcr.io/mkilijanek/ioc-service:${IMAGE_TAG:-latest}
    build:
      context: .
    command: ["python", "-m", "app.worker"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-}
      CACHE_TTL: ${CACHE_TTL:-300}
      ENABLE_BACKGROUND_JOBS: ${ENABLE_BACKGROUND_JOBS:-true}
      UPDATE_INTERVAL: ${UPDATE_INTERVAL:-600}
      WORKER_HEALTH_HOST: ${WORKER_HEALTH_HOST:-0.0.0.0}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-8091}
      WORKER_HEALTH_MAX_LOOP_AGE_S: ${WORKER_HEALTH_MAX_LOOP_AGE_S:-120}
      WORKER_SHUTDOWN_GRACE_S: ${WORKER_SHUTDOWN_GRACE_S:-30}
      SYNC_JOB_MAX_RETRIES: ${SYNC_JOB_MAX_RETRIES:-3}
      SYNC_JOB_RETRY_BASE_DELAY_S: ${SYNC_JOB_RETRY_BASE_DELAY_S:-30}
      SYNC_JOB_RETRY_MAX_DELAY_S: ${SYNC_JOB_RETRY_MAX_DELAY_S:-900}
      AUDIT_INTEGRITY_VERIFY_INTERVAL_S: ${AUDIT_INTEGRITY_VERIFY_INTERVAL_S:-3600}
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-true}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-6}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-4}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      REQUESTS_SKIP_TLS_VERIFY: ${REQUESTS_SKIP_TLS_VERIFY:-false}

      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-threatfeed}:${POSTGRES_PASSWORD:-threatfeed}@postgres:5432/${POSTGRES_DB:-threatfeed}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0

      CROWDSEC_API_KEY: ${CROWDSEC_API_KEY:-}
      CROWDSEC_LISTS: ${CROWDSEC_LISTS:-}
      MISP_URL: ${MISP_URL:-}
      MISP_API_KEY: ${MISP_API_KEY:-}
      MISP_VERIFY_SSL: ${MISP_VERIFY_SSL:-false}
      MISP_DAYS: ${MISP_DAYS:-7}
      ABUSECH_AUTH_KEY: ${ABUSECH_AUTH_KEY:-}
      THREATFOX_ENABLED: ${THREATFOX_ENABLED:-false}
      THREATFOX_API_URL: ${THREATFOX_API_URL:-https://threatfox-api.abuse.ch/api/v1/}
      THREATFOX_AUTH_KEY: ${THREATFOX_AUTH_KEY:-}
      THREATFOX_DAYS: ${THREATFOX_DAYS:-3}
      THREATFOX_LIMIT: ${THREATFOX_LIMIT:-1000}
      URLHAUS_ENABLED: ${URLHAUS_ENABLED:-false}
      URLHAUS_FEED_URL: ${URLHAUS_FEED_URL:-https://urlhaus.abuse.ch/downloads/text_online/}
      URLHAUS_LIMIT: ${URLHAUS_LIMIT:-10000}
      FEODOTRACKER_ENABLED: ${FEODOTRACKER_ENABLED:-false}
      FEODOTRACKER_FEED_URL: ${FEODOTRACKER_FEED_URL:-https://feodotracker.abuse.ch/downloads/ipblocklist.txt}
      FEODOTRACKER_LIMIT: ${FEODOTRACKER_LIMIT:-10000}
      YARAIFY_ENABLED: ${YARAIFY_ENABLED:-false}
      YARAIFY_API_URL: ${YARAIFY_API_URL:-https://yaraify-api.abuse.ch/api/v1/}
      YARAIFY_AUTH_KEY: ${YARAIFY_AUTH_KEY:-}
      YARAIFY_IDENTIFIER: ${YARAIFY_IDENTIFIER:-}
      YARAIFY_LOOKUP_HASHES: ${YARAIFY_LOOKUP_HASHES:-}
      YARAIFY_TASK_STATUS: ${YARAIFY_TASK_STATUS:-processed}
      YARAIFY_LIMIT: ${YARAIFY_LIMIT:-250}
      HUNTING_FPLIST_ENABLED: ${HUNTING_FPLIST_ENABLED:-false}
      HUNTING_API_URL: ${HUNTING_API_URL:-https://hunting-api.abuse.ch/api/v1/}
      HUNTING_AUTH_KEY: ${HUNTING_AUTH_KEY:-}
      HUNTING_FPLIST_FORMAT: ${HUNTING_FPLIST_FORMAT:-csv}
      HUNTING_FPLIST_LIMIT: ${HUNTING_FPLIST_LIMIT:-10000}
      ABUSECH_TIMEOUT_S: ${ABUSECH_TIMEOUT_S:-30}
      ABUSECH_RETRY_ATTEMPTS: ${ABUSECH_RETRY_ATTEMPTS:-4}
      ABUSECH_RETRY_BASE_DELAY_S: ${ABUSECH_RETRY_BASE_DELAY_S:-1}
      ABUSECH_CIRCUIT_FAIL_THRESHOLD: ${ABUSECH_CIRCUIT_FAIL_THRESHOLD:-3}
      ABUSECH_CIRCUIT_COOLDOWN_S: ${ABUSECH_CIRCUIT_COOLDOWN_S:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${WORKER_HEALTH_PORT:-8091}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    profiles: ["edge"]
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-7003}:7003"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1:7003/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
