user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections  1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  keepalive_timeout  65;

  # Use Docker's embedded DNS resolver so nginx re-resolves service names after
  # container recreation (avoids stale-IP 502 when app container gets a new IP).
  resolver 127.0.0.11 valid=10s;

  # Rate limit zones
  limit_req_zone $binary_remote_addr zone=feed_limit:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

  include /etc/nginx/conf.d/*.conf;
}
