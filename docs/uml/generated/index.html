<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IOC Service UML Diagrams</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; max-width: 1200px; margin: 0 auto; padding: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(460px, 1fr)); gap: 1rem; }
    .card { border: 1px solid #d0d7de; border-radius: 10px; padding: .8rem; }
    img { max-width: 100%; height: auto; border: 1px solid #d0d7de; border-radius: 6px; }
    code { background:#f6f8fa; padding:.1rem .3rem; border-radius:4px; }
  </style>
</head>
<body>
  <h1>IOC Service UML Diagrams (1.4.0)</h1>
  <p>Generated artifacts from <code>docs/uml/*.puml</code>.</p>
  <div class="grid">
    <div class="card"><h2>Deployment</h2><img src="IOC_Service_Deployment.png" alt="Deployment" /></div>
    <div class="card"><h2>Component</h2><img src="IOC_Service_Component.png" alt="Component" /></div>
    <div class="card"><h2>Domain Model</h2><img src="IOC_Service_Domain_Model.png" alt="Domain Model" /></div>
    <div class="card"><h2>Service Layer</h2><img src="IOC_Service_Layer.png" alt="Service Layer" /></div>
    <div class="card"><h2>ER Diagram</h2><img src="IOC_Service_ER_Diagram.png" alt="ER Diagram" /></div>
    <div class="card"><h2>Use Cases</h2><img src="IOC_Service_Use_Cases.png" alt="Use Cases" /></div>
    <div class="card"><h2>Sync Sequence</h2><img src="IOC_Service_Sync_Sequence.png" alt="Sync Sequence" /></div>
    <div class="card"><h2>Export Sequence</h2><img src="IOC_Service_Export_Sequence.png" alt="Export Sequence" /></div>
    <div class="card"><h2>Ingestion Activity</h2><img src="IOC_Service_Ingestion_Activity.png" alt="Ingestion Activity" /></div>
    <div class="card"><h2>SyncJob State</h2><img src="IOC_Service_SyncJob_StateMachine.png" alt="SyncJob State" /></div>
  </div>
</body>
</html>
