services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-threatfeed}
      POSTGRES_USER: ${POSTGRES_USER:-threatfeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threatfeed}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redispass}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    image: ${APP_IMAGE_REPOSITORY:-ghcr.io/mkilijanek/ioc-service}:${IMAGE_TAG:-latest}
    command: ["sh", "-c", "scripts/db-migrate.sh"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-threatfeed}:${POSTGRES_PASSWORD:-threatfeed}@postgres:5432/${POSTGRES_DB:-threatfeed}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      REQUESTS_SKIP_TLS_VERIFY: ${REQUESTS_SKIP_TLS_VERIFY:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ${APP_IMAGE_REPOSITORY:-ghcr.io/mkilijanek/ioc-service}:${IMAGE_TAG:-latest}
    #build:
    #   context: .
    environment:
      # Flask/Gunicorn
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-}
      CACHE_TTL: ${CACHE_TTL:-300}
      APP_PORT: ${APP_PORT:-8080}
      WORKERS: ${WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-true}
      RATE_LIMITS_ENABLED: ${RATE_LIMITS_ENABLED:-true}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-6}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-4}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      CORRELATION_SNAPSHOT_ENABLED: ${CORRELATION_SNAPSHOT_ENABLED:-true}
      CORRELATION_SNAPSHOT_INTERVAL: ${CORRELATION_SNAPSHOT_INTERVAL:-60}
      CORRELATION_SNAPSHOT_MIN_SOURCES: ${CORRELATION_SNAPSHOT_MIN_SOURCES:-2}
      CORRELATION_SNAPSHOT_LIMIT: ${CORRELATION_SNAPSHOT_LIMIT:-1000}
      CORRELATION_SNAPSHOT_TYPES: ${CORRELATION_SNAPSHOT_TYPES:-all,domain,ip,url,hash,email}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      REQUESTS_SKIP_TLS_VERIFY: ${REQUESTS_SKIP_TLS_VERIFY:-false}

      # DB
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-threatfeed}:${POSTGRES_PASSWORD:-threatfeed}@postgres:5432/${POSTGRES_DB:-threatfeed}

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0

      # Integrations
      CROWDSEC_API_KEY: ${CROWDSEC_API_KEY:-}
      CROWDSEC_LISTS: ${CROWDSEC_LISTS:-}
      MISP_URL: ${MISP_URL:-}
      MISP_API_KEY: ${MISP_API_KEY:-}
      MISP_VERIFY_SSL: ${MISP_VERIFY_SSL:-false}
      MISP_DAYS: ${MISP_DAYS:-7}
      MALWAREBAZAAR_SINCE_DATE: ${MALWAREBAZAAR_SINCE_DATE:-}

      # Security
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      APP_HOST_PORT: ${APP_HOST_PORT:-7005}
      HTTPS_PORT: ${HTTPS_PORT:-7003}
      CANONICAL_HTTPS_HOST: ${CANONICAL_HTTPS_HOST:-}
      EDGE_HTTPS_ENABLED: ${EDGE_HTTPS_ENABLED:-true}
      HSTS_ENABLED: ${HSTS_ENABLED:-true}
      SESSION_COOKIE_SECURE_ENABLED: ${SESSION_COOKIE_SECURE_ENABLED:-true}

      # Admin panel — see docs/configuration.md "Image variants"
      # HTTP variant: set EDGE_HTTPS_ENABLED=false, SESSION_COOKIE_SECURE_ENABLED=false,
      #               ADMIN_AUTH_ENABLED=false (or true + ADMIN_API_TOKEN)
      # TLS variant:  defaults below are appropriate; set ADMIN_API_TOKEN to a strong token
      ADMIN_PANEL_ENABLED: ${ADMIN_PANEL_ENABLED:-true}
      ADMIN_AUTH_ENABLED: ${ADMIN_AUTH_ENABLED:-true}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
    ports:
      - "${APP_HOST_BIND:-127.0.0.1}:${APP_HOST_PORT:-7005}:${APP_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker:
    image: ${APP_IMAGE_REPOSITORY:-ghcr.io/mkilijanek/ioc-service}:${IMAGE_TAG:-latest}
    #build:
    #  context: .
    command: ["python", "-m", "app.worker"]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:-}
      CACHE_TTL: ${CACHE_TTL:-300}
      ENABLE_BACKGROUND_JOBS: ${ENABLE_BACKGROUND_JOBS:-true}
      UPDATE_INTERVAL: ${UPDATE_INTERVAL:-600}
      AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-true}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-6}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-4}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      REQUESTS_SKIP_TLS_VERIFY: ${REQUESTS_SKIP_TLS_VERIFY:-false}

      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-threatfeed}:${POSTGRES_PASSWORD:-threatfeed}@postgres:5432/${POSTGRES_DB:-threatfeed}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0

      CROWDSEC_API_KEY: ${CROWDSEC_API_KEY:-}
      CROWDSEC_LISTS: ${CROWDSEC_LISTS:-}
      MISP_URL: ${MISP_URL:-}
      MISP_API_KEY: ${MISP_API_KEY:-}
      MISP_VERIFY_SSL: ${MISP_VERIFY_SSL:-false}
      MISP_DAYS: ${MISP_DAYS:-7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nginx:
    image: ${TLS_IMAGE_REPOSITORY:-ghcr.io/mkilijanek/ioc-service-tls}:${TLS_IMAGE_TAG:-${IMAGE_TAG:-latest}}
    profiles: ["edge"]
    environment:
      NGINX_TLS_ENABLED: ${NGINX_TLS_ENABLED:-true}
      NGINX_HSTS_ENABLED: ${NGINX_HSTS_ENABLED:-true}
      NGINX_HTTP_PORT: 80
      NGINX_HTTPS_PORT: 7003
      NGINX_PUBLIC_HTTPS_PORT: ${HTTPS_PORT:-7003}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-7003}:7003"
    volumes:
      - ${SSL_DIR:-/home/kili/Repo/ioc-service/ssl}:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$${NGINX_TLS_ENABLED:-true}\" = \"true\" ]; then wget --no-check-certificate -qO- https://127.0.0.1:$${NGINX_HTTPS_PORT:-7003}/readyz; else wget -qO- http://127.0.0.1:$${NGINX_HTTP_PORT:-80}/readyz; fi || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
