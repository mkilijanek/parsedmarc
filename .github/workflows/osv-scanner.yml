name: OSV Scanner

on:
  push:
    branches:
      - main
      - kili
      - kili-dev
  pull_request:
    branches:
      - main
      - kili
      - kordek
  schedule:
    # Run weekly on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        -r
        ./
      fail-on-vuln: true
      # SARIF upload requires GitHub Advanced Security / Code Scanning to be enabled.
      # Set to true if Code Scanning is activated for this repository.
      upload-sarif: false
    permissions:
      actions: read
      contents: read
      security-events: write
