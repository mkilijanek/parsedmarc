name: Snyk Container Scan (Published Images)

on:
  schedule:
    - cron: "36 12 * * 4" # Thu 12:36 UTC
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  snyk:
    name: Snyk container (latest + distroless + locked)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: latest
            repo: parsedmarc
            tag: latest
          - name: distroless
            repo: parsedmarc
            tag: distroless
          - name: locked-alpine
            repo: parsedmarc-locked
            tag: alpine
          - name: locked-debian
            repo: parsedmarc-locked
            tag: debian
          - name: locked-ubi
            repo: parsedmarc-locked
            tag: ubi

    steps:
      - name: Resolve image ref
        id: ref
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          BASE="ghcr.io/${OWNER}/${{ matrix.target.repo }}"
          NAME="${{ matrix.target.name }}"

          if [ "${{ github.event_name }}" = "release" ]; then
            VER="${GITHUB_REF_NAME}"
            case "${NAME}" in
              latest)
                echo "IMAGE_REF=${BASE}:${VER}" >> "$GITHUB_OUTPUT"
                ;;
              distroless)
                echo "IMAGE_REF=${BASE}:${VER}-distroless" >> "$GITHUB_OUTPUT"
                ;;
              locked-alpine)
                echo "IMAGE_REF=${BASE}:${VER}-alpine" >> "$GITHUB_OUTPUT"
                ;;
              locked-debian)
                echo "IMAGE_REF=${BASE}:${VER}-debian" >> "$GITHUB_OUTPUT"
                ;;
              locked-ubi)
                echo "IMAGE_REF=${BASE}:${VER}-ubi" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "Unsupported target"; exit 1
                ;;
            esac
          else
            echo "IMAGE_REF=${BASE}:${{ matrix.target.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR with retry
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              exit 0
            fi

            if [ "${attempt}" -eq 5 ]; then
              echo "GHCR login failed after ${attempt} attempts"
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Check image exists in GHCR
        id: image_check
        shell: bash
        run: |
          IMAGE_REF="${{ steps.ref.outputs.IMAGE_REF }}"
          ATTEMPTS=1
          SLEEP_SECONDS=0

          if [ "${{ github.event_name }}" = "release" ]; then
            ATTEMPTS=20
            SLEEP_SECONDS=30
          fi

          for attempt in $(seq 1 "${ATTEMPTS}"); do
            if docker manifest inspect "${IMAGE_REF}" >/dev/null 2>&1; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "${attempt}" -lt "${ATTEMPTS}" ]; then
              sleep "${SLEEP_SECONDS}"
            fi
          done

          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Image not available yet: ${IMAGE_REF}"

          if [ "${{ github.event_name }}" = "release" ]; then
            exit 1
          fi

      - name: Pull published image
        if: steps.image_check.outputs.exists == 'true'
        run: docker pull "${{ steps.ref.outputs.IMAGE_REF }}"

      - name: Install Snyk CLI
        if: steps.image_check.outputs.exists == 'true'
        shell: bash
        run: |
          VERSION=latest
          BINARY=snyk-linux
          BASE_URL="https://downloads.snyk.io/cli/${VERSION}"
          FALLBACK_URL="https://static.snyk.io/cli/${VERSION}"

          download_and_verify() {
            local url="$1"
            curl --fail --location --retry 2 --output "${BINARY}" "${url}/${BINARY}?utm_source=GITHUB_ACTIONS"
            curl --fail --location --retry 2 --output "${BINARY}.sha256" "${url}/${BINARY}.sha256?utm_source=GITHUB_ACTIONS"
            sha256sum -c "${BINARY}.sha256"
          }

          download_and_verify "${BASE_URL}" || download_and_verify "${FALLBACK_URL}"
          chmod +x "${BINARY}"
          sudo mv "${BINARY}" /usr/local/bin/snyk
          rm -f "${BINARY}.sha256"
          snyk version

      - name: Snyk container test (SARIF)
        if: steps.image_check.outputs.exists == 'true'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth "${SNYK_TOKEN}"
          snyk container test "${{ steps.ref.outputs.IMAGE_REF }}" \
            --severity-threshold=high \
            --sarif-file-output="snyk-container-${{ matrix.target.name }}.sarif"

      - name: Verify SARIF was produced
        if: steps.image_check.outputs.exists == 'true'
        run: |
          FILE="snyk-container-${{ matrix.target.name }}.sarif"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: SARIF file not found: $FILE"
            exit 1
          fi
          echo "SARIF file found: $FILE"

      - name: Upload SARIF to GitHub Security
        if: steps.image_check.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          sarif_file: snyk-container-${{ matrix.target.name }}.sarif
          category: snyk-container-published-${{ matrix.target.name }}
