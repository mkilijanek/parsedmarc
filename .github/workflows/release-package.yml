name: Release Package

on:
  push:
    branches:
      - main
      - kili
      - kili-dev
      - kordek
  pull_request:
    branches:
      - main
      - kili
      - kordek
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  noop:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Release packaging workflow is active; package build runs only on release events."

  package-and-build:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push image to GHCR (with SBOM + provenance)
        id: buildpush
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

      - name: Prepare release bundle
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          BUNDLE_ROOT="release-bundle"
          BUNDLE_NAME="ioc-service-${TAG}-bundle"
          mkdir -p "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts"

          # Compose and image build context essentials.
          cp docker-compose.yml "${BUNDLE_ROOT}/${BUNDLE_NAME}/"
          cp docker-compose.nginx.snippet.yml "${BUNDLE_ROOT}/${BUNDLE_NAME}/"
          cp Dockerfile "${BUNDLE_ROOT}/${BUNDLE_NAME}/"
          cp .env.example "${BUNDLE_ROOT}/${BUNDLE_NAME}/"

          # Shell scripts for benchmarking and container administration.
          cp scripts/benchmark_cluster_m12.sh "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"
          cp scripts/m15_chaos_check.sh "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"
          cp scripts/m15_premerge_gate.sh "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"
          cp scripts/m16_release_readiness.sh "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"
          cp scripts/setup-ssl.sh "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"
          cp scripts/generate-secrets.sh "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"
          cp scripts/dev-env.sh "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"
          cp scripts/load-secrets.sh "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"

          # Benchmark helpers used by .sh wrappers.
          cp scripts/benchmark_m12.py "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"
          cp scripts/benchmark_suite_m14.py "${BUNDLE_ROOT}/${BUNDLE_NAME}/scripts/"

          {
            echo "Included files:"
            echo "- docker-compose.yml"
            echo "- docker-compose.nginx.snippet.yml"
            echo "- Dockerfile"
            echo "- .env.example"
            echo "- scripts/*.sh for benchmark/admin tasks"
            echo "- scripts/benchmark_m12.py"
            echo "- scripts/benchmark_suite_m14.py"
          } > "${BUNDLE_ROOT}/${BUNDLE_NAME}/MANIFEST.txt"

          tar -C "${BUNDLE_ROOT}" -czf "${BUNDLE_NAME}.tar.gz" "${BUNDLE_NAME}"
          echo "ASSET_PATH=${BUNDLE_NAME}.tar.gz" >> "${GITHUB_ENV}"

      - name: Prepare image info asset
        env:
          TAG: ${{ github.event.release.tag_name }}
          DIGEST: ${{ steps.buildpush.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          INFO_FILE="ioc-service-${TAG}-image-info.txt"
          {
            echo "Image published to GHCR"
            echo "Repository: ${IMAGE}"
            echo "Tag: ${TAG}"
            echo "Digest: ${DIGEST}"
            echo
            echo "Pull by tag:"
            echo "  docker pull ${IMAGE}:${TAG}"
            echo "Pull by digest:"
            echo "  docker pull ${IMAGE}@${DIGEST}"
            echo
            echo "SBOM/provenance attestations are published alongside the image in GHCR."
          } > "${INFO_FILE}"
          echo "DOCKER_ASSET_PATH=${INFO_FILE}" >> "${GITHUB_ENV}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: ${{ env.ASSET_PATH }}

      - name: Upload image info artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-image-info
          path: ${{ env.DOCKER_ASSET_PATH }}

      - name: Attach bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_PATH }}
            ${{ env.DOCKER_ASSET_PATH }}
