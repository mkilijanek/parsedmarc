name: build-locked-release

on:
  push:
    branches: [ main ]
    tags:
      - '*.*.*'
      - '*.*.*-h*'
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/mkilijanek/parsedmarc-locked
  PYTHON_VERSION: "3.12"
  PIP_TOOLS_VERSION: "7.5.3"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Compute reproducible timestamps
        id: repro
        shell: bash
        run: |
          SDE=$(git log -1 --format=%ct)
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_OUTPUT"
          BUILD_DATE=$(date -u -d "@${SDE}" +%Y-%m-%dT%H:%M:%SZ)
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate requirements.lock (with hashes)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-tools==${PIP_TOOLS_VERSION}"
          pip-compile \
            --generate-hashes \
            --resolver=backtracking \
            --output-file requirements.lock \
            requirements.in

      - name: Upload requirements.lock artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: requirements.lock
          path: requirements.lock
          if-no-files-found: error

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push parsedmarc-locked:alpine
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: Dockerfile-alpine.locked
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:alpine
            ${{ env.IMAGE }}:${{ steps.repro.outputs.VERSION }}-alpine
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true

      - name: Build and push parsedmarc-locked:debian
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: Dockerfile-debian.locked
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:debian
            ${{ env.IMAGE }}:${{ steps.repro.outputs.VERSION }}-debian
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true

      - name: Build and push parsedmarc-locked:ubi
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: Dockerfile-ubi.locked
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:ubi
            ${{ env.IMAGE }}:${{ steps.repro.outputs.VERSION }}-ubi
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true
