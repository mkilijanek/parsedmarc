name: Build and Publish Docker Images (Reproducible Metadata)

on:
  push:
    tags:
      - '*.*.*'
      - '*.*.*-h*'

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/mkilijanek/parsedmarc

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Compute reproducible timestamps
        id: repro
        shell: bash
        run: |
          # Use commit time as SOURCE_DATE_EPOCH (reproducible)
          SDE=$(git log -1 --format=%ct)
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_OUTPUT"
          # RFC3339 UTC derived from SOURCE_DATE_EPOCH (reproducible)
          BUILD_DATE=$(date -u -d "@${SDE}" +%Y-%m-%dT%H:%M:%SZ)
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          # Hotfix tags use suffix -hN (e.g. 9.1.0-h1); parsedmarc package stays at base semver.
          PARSEDMARC_VERSION="$(echo "${GITHUB_REF_NAME}" | sed -E 's/-h[0-9]+$//')"
          echo "PARSEDMARC_VERSION=${PARSEDMARC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (standard)
        id: meta_std
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.repro.outputs.VERSION }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.created=${{ steps.repro.outputs.BUILD_DATE }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.repro.outputs.VERSION }}

      - name: Docker meta (distroless)
        id: meta_dst
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.repro.outputs.VERSION }}-distroless
            type=raw,value=distroless
          labels: |
            org.opencontainers.image.created=${{ steps.repro.outputs.BUILD_DATE }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.repro.outputs.VERSION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      ############################################################
      # Standard image
      ############################################################
      - name: Build and push (standard)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_std.outputs.tags }}
          labels: ${{ steps.meta_std.outputs.labels }}
          build-args: |
            PARSEDMARC_VERSION=${{ steps.repro.outputs.PARSEDMARC_VERSION }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true

      ############################################################
      # Distroless hardened image
      ############################################################
      - name: Build and push (distroless hardened)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile.hardened
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_dst.outputs.tags }}
          labels: ${{ steps.meta_dst.outputs.labels }}
          build-args: |
            PARSEDMARC_VERSION=${{ steps.repro.outputs.PARSEDMARC_VERSION }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true

      ############################################################
      # Cosign signing (keyless)
      ############################################################
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Sign images (keyless)
        shell: bash
        run: |
          cosign sign --yes "${{ env.IMAGE }}:${{ steps.repro.outputs.VERSION }}"
          cosign sign --yes "${{ env.IMAGE }}:${{ steps.repro.outputs.VERSION }}-distroless"
