name: CI

on:
  push:
    branches:
      - main
      - kili
      - kili-dev
  pull_request:
    branches:
      - main
      - kili
      - kordek

jobs:
  quality:
    name: quality gates
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies and quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint refactored boundary
        run: |
          ruff check \
            app/main.py \
            app/factory.py \
            app/routes/ops.py \
            app/routes/ops_admin.py \
            app/routes/ops_api.py \
            app/views/legacy_public.py \
            tests/test_ops_contracts.py

      - name: Type-check refactored boundary
        run: |
          mypy \
            app/main.py \
            app/routes/ops.py \
            app/routes/ops_admin.py \
            app/routes/ops_api.py \
            app/views/legacy_public.py

      - name: Enforce complexity ceiling on refactored boundary
        run: |
          test -z "$(radon cc \
            app/main.py \
            app/factory.py \
            app/routes/ops.py \
            app/routes/ops_admin.py \
            app/routes/ops_api.py \
            app/views/legacy_public.py \
            -s -n E)"

      - name: Enforce coverage floor on refactored boundary
        run: |
          pytest -q \
            --cov=app.main \
            --cov=app.factory \
            --cov=app.routes.ops \
            --cov=app.routes.ops_admin \
            --cov=app.routes.ops_api \
            --cov=app.views.legacy_public \
            --cov-report=term-missing \
            --cov-fail-under=55 \
            tests/test_ui_issues.py \
            tests/test_api.py \
            tests/test_security.py \
            tests/test_ops_contracts.py

  test:
    name: tests (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate imports and syntax
        run: |
          python -m compileall -q app
          python - <<'PY'
          from app.db import Base  # noqa: F401
          from app.main import create_app  # noqa: F401
          print("Import smoke check OK")
          PY

      - name: Run test suite
        run: pytest -q

  schema-drift:
    name: schema drift detection
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      SECRET_KEY: ci-secret-key-minimum-32-characters
      DATABASE_URL: sqlite:////tmp/ioc-schema-ci.db
      REDIS_URL: memory://
      ALLOWED_HOSTS: "*"
      RATE_LIMITS_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate ORM and Alembic schema alignment
        run: python scripts/validate_schema.py

      - name: Validate generated OpenAPI artifact
        run: python scripts/generate_openapi.py --check

  security-scan:
    name: security and dependency scan
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install security scanners
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

      - name: Run high-severity SAST gate
        run: bandit -r app --severity-level high --confidence-level medium

  postgres-integration:
    name: PostgreSQL integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: threatfeed_test
          POSTGRES_USER: threatfeed
          POSTGRES_PASSWORD: threatfeed
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U threatfeed -d threatfeed_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: .
      SECRET_KEY: ci-secret-key-minimum-32-characters
      DATABASE_URL: postgresql+psycopg2://threatfeed:threatfeed@localhost:5432/threatfeed_test
      REDIS_URL: memory://
      ALLOWED_HOSTS: "*"
      RATE_LIMITS_ENABLED: "false"
      RUN_POSTGRES_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Run PostgreSQL integration tests
        run: pytest -q tests/test_postgres_integration.py

  release-gate:
    name: m15 release gate
    runs-on: ubuntu-latest
    needs: [quality, test, schema-drift, security-scan, postgres-integration]
    env:
      PYTHONPATH: .
      SECRET_KEY: ci-secret-key-minimum-32-characters
      DATABASE_URL: sqlite:////tmp/ioc-ci.db
      REDIS_URL: memory://
      LOG_LEVEL: ERROR
      ALLOWED_HOSTS: "*"
      TRUSTED_PROXY_COUNT: "0"
      MISP_VERIFY_SSL: "true"
      ENABLE_BACKGROUND_JOBS: "false"
      RATE_LIMITS_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: |
          alembic upgrade head

      - name: Start app
        run: |
          gunicorn --bind 127.0.0.1:8080 --workers 1 --timeout 120 --worker-class sync 'app.main:create_app()' &
          echo $! > /tmp/ioc-ci-app.pid
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/healthz && break
            sleep 1
          done

      - name: Run M15 gate
        run: |
          RUNS=1 DURATION=6 CONCURRENCY=4 MIN_MIXED_RPS=120 MAX_MIXED_P95_MS=900 MAX_ERROR_RATE=0.05 \
          bash scripts/m15_premerge_gate.sh

      - name: Stop app
        if: always()
        run: |
          kill "$(cat /tmp/ioc-ci-app.pid)" || true
