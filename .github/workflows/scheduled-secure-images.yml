name: Scheduled Secure Image Build

on:
  schedule:
    - cron: '0 3 */14 * *'  # Every 14 days at 03:00 UTC
  workflow_dispatch:
    inputs:
      parsedmarc_version:
        description: 'Parsedmarc version (blank = latest GitHub release)'
        required: false
        default: ''

env:
  IMAGE: ghcr.io/mkilijanek/parsedmarc

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.parsedmarc_version }}" ]; then
            VERSION="${{ github.event.inputs.parsedmarc_version }}"
          else
            VERSION="$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          # Allow optional hotfix suffix in image tag while installing base parsedmarc semver from PyPI.
          PARSEDMARC_VERSION="$(echo "${VERSION}" | sed -E 's/-h[0-9]+$//')"
          echo "PARSEDMARC_VERSION=${PARSEDMARC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute reproducible timestamps
        id: repro
        shell: bash
        run: |
          SDE=$(git log -1 --format=%ct)
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_OUTPUT"
          BUILD_DATE=$(date -u -d "@${SDE}" +%Y-%m-%dT%H:%M:%SZ)
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (standard)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          build-args: |
            PARSEDMARC_VERSION=${{ steps.version.outputs.PARSEDMARC_VERSION }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Sign standard image (keyless)
        shell: bash
        run: |
          cosign sign --yes "${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}"

      - name: Build and push (distroless hardened)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: Dockerfile.hardened
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:distroless
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}-distroless
          build-args: |
            PARSEDMARC_VERSION=${{ steps.version.outputs.PARSEDMARC_VERSION }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true

      - name: Sign distroless image (keyless)
        shell: bash
        run: |
          cosign sign --yes "${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}-distroless"
