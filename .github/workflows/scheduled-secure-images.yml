name: Scheduled Secure Image Build

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 03:00 UTC
  workflow_dispatch:
    inputs:
      parsedmarc_version:
        description: 'Parsedmarc version'
        required: false
        default: '9.2.0'

env:
  DEFAULT_PARSEDMARC_VERSION: 9.2.0
  IMAGE: ghcr.io/mkilijanek/parsedmarc

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.parsedmarc_version }}" ]; then
            VERSION="${{ github.event.inputs.parsedmarc_version }}"
          else
            VERSION="${DEFAULT_PARSEDMARC_VERSION}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          # Allow optional hotfix suffix in image tag while installing base parsedmarc semver from PyPI.
          PARSEDMARC_VERSION="$(echo "${VERSION}" | sed -E 's/-h[0-9]+$//')"
          echo "PARSEDMARC_VERSION=${PARSEDMARC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compute reproducible timestamps
        id: repro
        shell: bash
        run: |
          SDE=$(git log -1 --format=%ct)
          echo "SOURCE_DATE_EPOCH=${SDE}" >> "$GITHUB_OUTPUT"
          BUILD_DATE=$(date -u -d "@${SDE}" +%Y-%m-%dT%H:%M:%SZ)
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (standard)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}
          build-args: |
            PARSEDMARC_VERSION=${{ steps.version.outputs.PARSEDMARC_VERSION }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true

      - name: Build and push (distroless hardened)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.hardened
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:distroless
            ${{ env.IMAGE }}:${{ steps.version.outputs.VERSION }}-distroless
          build-args: |
            PARSEDMARC_VERSION=${{ steps.version.outputs.PARSEDMARC_VERSION }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.repro.outputs.BUILD_DATE }}
            SOURCE_DATE_EPOCH=${{ steps.repro.outputs.SOURCE_DATE_EPOCH }}
          sbom: true
          provenance: true
