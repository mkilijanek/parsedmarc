name: Snyk Security (SAST + SCA + IaC)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "11 2 * * 4"   # Every Thursday 02:11 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    # Dependabot pull_request runs do not have access to SNYK_TOKEN.
    # Keep Snyk security scanning active on push/schedule/manual runs.
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scan: [sast, sca, iac]

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Snyk CLI
        shell: bash
        run: |
          VERSION=latest
          BINARY=snyk-linux
          BASE_URL="https://downloads.snyk.io/cli/${VERSION}"
          FALLBACK_URL="https://static.snyk.io/cli/${VERSION}"

          download_and_verify() {
            local url="$1"
            curl --fail --location --retry 2 --output "${BINARY}" "${url}/${BINARY}?utm_source=GITHUB_ACTIONS"
            curl --fail --location --retry 2 --output "${BINARY}.sha256" "${url}/${BINARY}.sha256?utm_source=GITHUB_ACTIONS"
            sha256sum -c "${BINARY}.sha256"
          }

          download_and_verify "${BASE_URL}" || download_and_verify "${FALLBACK_URL}"
          chmod +x "${BINARY}"
          sudo mv "${BINARY}" /usr/local/bin/snyk
          rm -f "${BINARY}.sha256"
          snyk version

      - name: Snyk auth
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth "$SNYK_TOKEN"

      # -------------------------
      # SAST (Snyk Code)
      # -------------------------
      - name: SAST (snyk code test)
        if: matrix.scan == 'sast'
        continue-on-error: true
        run: |
          snyk code test \
            --sarif-file-output=snyk-code.sarif

      - name: Check SAST SARIF exists
        if: matrix.scan == 'sast'
        id: sast_sarif
        shell: bash
        run: |
          [ -f snyk-code.sarif ] && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Upload SAST SARIF
        if: matrix.scan == 'sast' && steps.sast_sarif.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      # -------------------------
      # SCA (Open Source deps)
      # -------------------------
      - name: Set up Python
        if: matrix.scan == 'sca'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: SCA (snyk test)
        if: matrix.scan == 'sca'
        continue-on-error: true
        run: |
          # Snyk sam wykrywa typ projektu; dla Pythona zwykle requirements*.txt / pyproject.toml
          # Raport JSON jako artifact do audytu (najpewniejsze i stabilne).
          snyk test --severity-threshold=high --json-file-output=snyk-sca.json || true

      - name: Upload SCA report artifact
        if: matrix.scan == 'sca'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: snyk-sca.json
          path: snyk-sca.json
          if-no-files-found: warn

      # Optional gate (odkomentuj, jeśli chcesz fail pipeline na HIGH+ w SCA)
      # - name: SCA Gate (fail on HIGH+)
      #   if: matrix.scan == 'sca'
      #   run: snyk test --severity-threshold=high

      # -------------------------
      # IaC (Terraform/K8s/Compose/etc.)
      # -------------------------
      - name: IaC (snyk iac test)
        if: matrix.scan == 'iac'
        continue-on-error: true
        run: |
          # --report tworzy ładny output; SARIF do GitHub Code Scanning
          snyk iac test \
            --sarif-file-output=snyk-iac.sarif

      - name: Check IaC SARIF exists
        if: matrix.scan == 'iac'
        id: iac_sarif
        shell: bash
        run: |
          [ -f snyk-iac.sarif ] && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Upload IaC SARIF
        if: matrix.scan == 'iac' && steps.iac_sarif.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac
