<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Threat Feed Aggregator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='colors_and_type.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <style>
    body { min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 var(--space-6); }
    /* topbar styles live in app.css — .topbar, .topbar-inner, .brand, .nav */
    main { padding: var(--space-6) 0; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: var(--space-5); margin-bottom: var(--space-4); box-shadow: var(--shadow-card); transition: box-shadow var(--motion-fast); }
    .card:hover { box-shadow: var(--shadow-card-hover); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); padding-bottom: 0.75rem; border-bottom: 1px solid var(--line); }
    .card-title { margin: 0; font-size: var(--fs-xl); font-weight: var(--fw-semibold); }
    .btn { display: inline-flex; align-items: center; gap: var(--space-2); padding: 0.625rem var(--space-4); border-radius: var(--radius-md); border: 1px solid var(--line); background: var(--card); color: var(--fg); font-size: var(--fs-sm); font-weight: var(--fw-medium); cursor: pointer; transition: all var(--motion-fast); text-decoration: none; }
    .btn:hover { background: var(--bg); transform: translateY(-1px); }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: var(--on-primary); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-success { background: var(--success); border-color: var(--success); color: var(--on-primary); }
    .btn-warning { background: var(--warning); border-color: var(--warning); color: var(--on-primary); }
    .btn-danger { background: var(--error); border-color: var(--error); color: var(--on-primary); }
    .btn-sm { padding: 0.375rem 0.75rem; font-size: var(--fs-xs); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .form-group { margin-bottom: var(--space-4); }
    .form-label { display: block; margin-bottom: 0.375rem; font-weight: var(--fw-medium); font-size: var(--fs-sm); }
    .form-input { width: 100%; padding: 0.625rem 0.875rem; border: 1px solid var(--line); border-radius: var(--radius-md); background: var(--bg); color: var(--fg); font-size: var(--fs-base); transition: border-color var(--motion-fast), box-shadow var(--motion-fast); box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: var(--shadow-focus); }
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: var(--fs-base); }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--line); }
    tbody tr:hover { background: var(--bg); }
    .badge { display: inline-flex; align-items: center; gap: var(--space-1); padding: 0.25rem 0.75rem; border-radius: var(--radius-pill); font-size: var(--fs-sm); font-weight: var(--fw-medium); }
    .badge-success { background: var(--success-soft); color: var(--success); }
    .badge-warning { background: var(--warning-soft); color: var(--warning); }
    .badge-error { background: var(--error-soft); color: var(--error); }
    .badge-info { background: var(--info-soft); color: var(--info); }
    .spinner { display: inline-block; width: 1rem; height: 1rem; border: 2px solid var(--line); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast-container { position: fixed; top: var(--space-4); right: var(--space-4); z-index: 1000; display: flex; flex-direction: column; gap: var(--space-2); }
    .toast { display: flex; align-items: center; gap: 0.75rem; padding: var(--space-4) var(--space-5); border-radius: var(--radius-md); background: var(--card); border: 1px solid var(--line); box-shadow: var(--shadow-toast); animation: slideIn var(--motion-medium); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-success { border-left: 4px solid var(--success); }
    .toast-warning { border-left: 4px solid var(--warning); }
    .toast-error { border-left: 4px solid var(--error); }
    .toast-info { border-left: 4px solid var(--info); }
    .grid { display: grid; gap: var(--space-4); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
    .form-row { display: flex; flex-wrap: wrap; gap: var(--space-4); align-items: flex-end; }
    .form-row .form-group { flex: 1; min-width: 150px; }
    .form-checkbox { display: flex; align-items: center; gap: var(--space-2); }
    .form-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-2); }
    .text-muted { color: var(--muted); }
    .text-center { text-align: center; }
    .skip-link { position: absolute; left: -9999px; top: auto; width: 1px; height: 1px; overflow: hidden; }
    .skip-link:focus { position: fixed; left: var(--space-4); top: var(--space-4); width: auto; height: auto; padding: 0.75rem var(--space-4); background: var(--primary); color: var(--on-primary); z-index: 10000; border-radius: var(--radius-md); }

    /* Mobile navigation */
    .mobile-menu-btn { display: none; background: none; border: 1px solid var(--line); border-radius: var(--radius-md); padding: var(--space-2); cursor: pointer; }
    .mobile-menu-btn span { display: block; width: 20px; height: 2px; background: var(--fg); margin: 4px 0; transition: var(--motion-fast); }
    .nav-menu { display: flex; }

    /* Touch-friendly sizes */
    @media (pointer: coarse) {
      .btn, button, input, select { min-height: 44px; min-width: 44px; }
      .topbar nav a { padding: 0.75rem var(--space-4); }
    }

    /* Tablet breakpoint */
    @media (max-width: 1024px) {
      .container { padding: 0 var(--space-4); }
      .card { padding: var(--space-4); }
      h1 { font-size: var(--fs-2xl); }
      h2 { font-size: var(--fs-xl); }
    }

    /* Mobile breakpoint */
    @media (max-width: 768px) {
      .container { padding: 0 0.75rem; }
      .topbar-inner { flex-wrap: wrap; }
      .mobile-menu-btn { display: block; }
      .nav-menu {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 0;
        margin-top: 0.5rem;
        padding-top: 0.5rem;
        border-top: 1px solid var(--line);
      }
      .nav-menu.active { display: flex; }
      .topbar nav a {
        padding: 0.75rem var(--space-4);
        border-radius: var(--radius-md);
        margin: 0.125rem 0;
      }
      .topbar nav a:hover { background: var(--bg); }
      .card { padding: 0.75rem; margin-bottom: 0.75rem; }
      .btn { padding: 0.75rem var(--space-4); font-size: var(--fs-sm); }
      .form-row { flex-direction: column; align-items: stretch; }
      .form-row .form-group { min-width: auto; }
      .form-actions { flex-direction: column; }
      .form-actions .btn { width: 100%; justify-content: center; }
      table { font-size: var(--fs-sm); }
      th, td { padding: 0.5rem 0.375rem; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .toast-container { left: var(--space-4); right: var(--space-4); top: auto; bottom: var(--space-4); }
      .pager { justify-content: center; }
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }

    /* Small mobile breakpoint */
    @media (max-width: 480px) {
      .container { padding: 0 var(--space-2); }
      .metrics-grid { grid-template-columns: 1fr; }
      .badge { font-size: var(--fs-xs); padding: 0.2rem var(--space-2); }
    }

    /* Reduced motion preference */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Loading states and skeletons */
    .skeleton { background: linear-gradient(90deg, var(--line) 25%, var(--bg) 50%, var(--line) 75%); background-size: 200% 100%; animation: shimmer var(--motion-shimmer); border-radius: var(--radius-xs); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-text { height: 1em; margin-bottom: var(--space-2); }
    .skeleton-text:last-child { width: 80%; }
    .skeleton-title { height: 1.5rem; width: 60%; margin-bottom: var(--space-4); }
    .skeleton-row { height: 2.5rem; margin-bottom: var(--space-1); }
    .skeleton-card { height: 100px; margin-bottom: var(--space-4); border-radius: var(--radius-xl); }
    .skeleton-circle { width: 40px; height: 40px; border-radius: 50%; }
    .btn-loading { position: relative; color: transparent !important; pointer-events: none; }
    .btn-loading::after { content: ''; position: absolute; width: 1rem; height: 1rem; border: 2px solid var(--line); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; top: 50%; left: 50%; margin-top: -0.5rem; margin-left: -0.5rem; }
    .loading-overlay { position: absolute; inset: 0; background: rgba(var(--bg), 0.8); display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: inherit; }
    .loading-overlay .spinner { width: 2rem; height: 2rem; }
    [data-loading] { position: relative; }
    [data-loading] > *:not(.loading-overlay) { opacity: 0.6; pointer-events: none; }

    {% block extra_css %}{% endblock %}

    /* Onboarding tour */
    .tour-overlay { position:fixed;inset:0;z-index:10000;pointer-events:none; }
    .tour-step {
      position:fixed;z-index:10001;background:var(--card);border:2px solid var(--primary);
      border-radius:var(--radius-xl);padding:var(--space-5) var(--space-6);max-width:320px;box-shadow:var(--shadow-popover);
      pointer-events:all;
    }
    .tour-step h4 { margin:0 0 var(--space-2);font-size:var(--fs-md); }
    .tour-step p  { margin:0 0 var(--space-4);font-size:var(--fs-sm);opacity:.85; }
    .tour-step .tour-btns { display:flex;gap:var(--space-2);justify-content:flex-end; }
    .tour-step .tour-btns button { padding:.35rem .9rem;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:var(--fs-xs); }
    .tour-step .tour-btns .tour-next { background:var(--primary);color:var(--on-primary); }
    .tour-step .tour-btns .tour-skip { background:transparent;opacity:.6; }
    .tour-highlight { outline:3px solid var(--primary)!important;outline-offset:3px;border-radius:var(--radius-xs); }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="brand">
        <span class="target"><span class="dot"></span></span>
        <div style="display:flex;flex-direction:column;line-height:1.1">
          <span>Threat Feed Aggregator</span>
          <small>ioc-service</small>
        </div>
      </a>
      <button type="button" class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav nav-menu" id="navMenu">
        <a href="/" class="{% if active_page == 'home' %}active{% endif %}">Overview</a>
        <a href="/indicators" class="{% if active_page == 'indicators' %}active{% endif %}">Indicators</a>
        <a href="/admin" class="{% if active_page == 'admin' %}active{% endif %}">Admin</a>
        <a href="/logs" class="{% if active_page == 'logs' %}active{% endif %}">Logs</a>
      </nav>
      <button type="button" class="theme-btn" id="themeToggle" aria-label="Toggle theme">🌓</button>
    </div>
  </header>

  <main id="main-content" class="container">
    {% block content %}{% endblock %}
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script>
    (function() {
      const themeKey = 'ioc-theme';
      // localStorage throws SecurityError in sandboxed iframes and some
      // private-browsing modes; guard every access so the rest of the
      // script block keeps running even when storage is unavailable.
      window._lsGet = function(key) { try { return localStorage.getItem(key); } catch(e) { return null; } };
      window._lsSet = function(key, val) { try { localStorage.setItem(key, val); } catch(e) {} };
      const lsGet = window._lsGet, lsSet = window._lsSet;
      const preferredTheme = lsGet(themeKey);
      if (preferredTheme === 'dark' || preferredTheme === 'light') {
        document.body.setAttribute('data-theme', preferredTheme);
      } else {
        const systemDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
        document.body.setAttribute('data-theme', systemDark ? 'dark' : 'light');
      }
      document.getElementById('themeToggle')?.addEventListener('click', () => {
        const curr = document.body.getAttribute('data-theme') || 'light';
        const next = curr === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        lsSet(themeKey, next);
      });

      // Mobile menu toggle
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const navMenu = document.getElementById('navMenu');
      if (mobileMenuBtn && navMenu) {
        mobileMenuBtn.addEventListener('click', () => {
          const isExpanded = navMenu.classList.toggle('active');
          mobileMenuBtn.setAttribute('aria-expanded', isExpanded);
        });
        // Close menu when clicking a link
        navMenu.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            navMenu.classList.remove('active');
            mobileMenuBtn.setAttribute('aria-expanded', 'false');
          });
        });
      }
    })();

    window.showToast = function(message, type = 'info', duration = 5000) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.setAttribute('role', 'alert');
      const icons = { success: '✓', warning: '⚠', error: '✗', info: 'ℹ' };
      toast.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, duration);
    };

    window.apiRequest = async function(url, options = {}) {
      const defaultOptions = {
        headers: { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest' }
      };
      try {
        const response = await fetch(url, { ...defaultOptions, ...options });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
      } catch (error) {
        console.error('API request failed:', error);
        showToast('Request failed: ' + error.message, 'error');
        throw error;
      }
    };

    window.confirmAction = function(message, callback) {
      if (confirm(message)) { callback(); }
    };

    // Loading state utilities
    window.setLoading = function(element, loading = true) {
      if (typeof element === 'string') element = document.querySelector(element);
      if (!element) return;
      if (loading) {
        element.setAttribute('data-loading', 'true');
        element.classList.add('btn-loading');
        element.disabled = true;
      } else {
        element.removeAttribute('data-loading');
        element.classList.remove('btn-loading');
        element.disabled = false;
      }
    };

    window.createSkeleton = function(container, type = 'text', count = 3) {
      if (typeof container === 'string') container = document.querySelector(container);
      if (!container) return;
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const skeleton = document.createElement('div');
        skeleton.className = `skeleton skeleton-${type}`;
        container.appendChild(skeleton);
      }
    };

    window.removeSkeleton = function(container) {
      if (typeof container === 'string') container = document.querySelector(container);
      if (!container) return;
      container.querySelectorAll('.skeleton').forEach(el => el.remove());
    };

    // Auto-add loading states to forms
    document.querySelectorAll('form').forEach(form => {
      form.addEventListener('submit', function(e) {
        const submitBtn = form.querySelector('button[type="submit"]');
        if (submitBtn && !submitBtn.disabled) {
          setLoading(submitBtn, true);
          // Auto-remove loading after 30s as safety
          setTimeout(() => setLoading(submitBtn, false), 30000);
        }
      });
    });

    {% block extra_js %}{% endblock %}

    // Onboarding tour — shown once on first visit, skipped thereafter
    (function() {
      if (window._lsGet('ioc_tour_done')) return;
      var steps = [
        { title: 'Welcome to IOC Threat Feed Aggregator', text: 'This short tour highlights the key features. Click Next to continue or Skip to dismiss.', anchor: null },
        { title: 'Indicators', text: 'Browse, search and filter all IOCs collected from your threat intelligence feeds.', anchor: 'a[href="/indicators"]' },
        { title: 'Search', text: 'Use the search bar with Kibana-style syntax: <code>type:ip AND confidence:>70</code>', anchor: 'input[name="q"], input[name="search"]' },
        { title: 'Export', text: 'Export IOCs in 17 formats — TXT, CSV, JSON, Splunk HEC, FortiGate, and more.', anchor: 'a[href*="/indicators/txt"], a[href*="export"]' },
        { title: 'Admin Panel', text: 'Configure feeds, monitor sync jobs, and manage operational settings.', anchor: 'a[href="/admin"]' },
      ];
      var current = 0;
      var stepEl = null;

      function showStep(i) {
        if (stepEl) stepEl.remove();
        if (i >= steps.length) { finish(); return; }
        var s = steps[i];
        stepEl = document.createElement('div');
        stepEl.className = 'tour-step';
        stepEl.innerHTML = '<h4>' + s.title + '</h4><p>' + s.text + '</p>' +
          '<div class="tour-btns">' +
          '<button class="tour-skip">Skip tour</button>' +
          '<button class="tour-next">' + (i < steps.length-1 ? 'Next &rarr;' : 'Done') + '</button>' +
          '</div>';
        document.body.appendChild(stepEl);

        // Position near anchor if present
        var anchor = s.anchor ? document.querySelector(s.anchor) : null;
        if (anchor) {
          anchor.classList.add('tour-highlight');
          var r = anchor.getBoundingClientRect();
          stepEl.style.top  = Math.min(r.bottom + 12, window.innerHeight - 200) + 'px';
          stepEl.style.left = Math.min(r.left, window.innerWidth - 340) + 'px';
        } else {
          stepEl.style.top = '50%'; stepEl.style.left = '50%';
          stepEl.style.transform = 'translate(-50%,-50%)';
        }

        stepEl.querySelector('.tour-next').onclick = function() {
          if (anchor) anchor.classList.remove('tour-highlight');
          showStep(i + 1);
        };
        stepEl.querySelector('.tour-skip').onclick = finish;
        current = i;
      }

      function finish() {
        if (stepEl) stepEl.remove();
        document.querySelectorAll('.tour-highlight').forEach(function(el) { el.classList.remove('tour-highlight'); });
        window._lsSet('ioc_tour_done', '1');
      }

      document.addEventListener('DOMContentLoaded', function() { showStep(0); });
    })();

    // Keyboard shortcuts
    (function() {
      var seq = '';
      var seqTimer = null;
      var helpVisible = false;

      function showHelp() {
        var d = document.getElementById('kb-help-dialog');
        if (!d) return;
        d.style.display = 'flex';
        helpVisible = true;
        d.focus();
      }
      function hideHelp() {
        var d = document.getElementById('kb-help-dialog');
        if (!d) return;
        d.style.display = 'none';
        helpVisible = false;
      }

      document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT' || e.target.isContentEditable) {
          if (e.key === 'Escape') { e.target.blur(); }
          return;
        }
        if (e.ctrlKey || e.altKey || e.metaKey) return;

        if (e.key === 'Escape') { hideHelp(); seq = ''; return; }
        if (e.key === '?') { showHelp(); return; }
        if (e.key === '/') {
          var s = document.querySelector('input[name="q"], input[name="search"], #search-input');
          if (s) { e.preventDefault(); s.focus(); }
          return;
        }
        if (e.key === 'r') { location.reload(); return; }

        seq += e.key;
        if (seqTimer) clearTimeout(seqTimer);
        seqTimer = setTimeout(function() { seq = ''; }, 1200);

        if (seq === 'gi') { location.href = '/indicators'; seq = ''; }
        else if (seq === 'ga') { location.href = '/admin'; seq = ''; }
        else if (seq === 'gl') { location.href = '/logs'; seq = ''; }
        else if (seq === 'gd') { location.href = '/'; seq = ''; }
      });

      document.addEventListener('DOMContentLoaded', function() {
        var overlay = document.createElement('div');
        overlay.id = 'kb-help-dialog';
        overlay.tabIndex = -1;
        overlay.style.cssText = 'display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);align-items:center;justify-content:center;';
        overlay.innerHTML = '<div style="background:var(--card);border-radius:.75rem;padding:1.5rem 2rem;min-width:320px;max-width:480px;box-shadow:var(--shadow-popover)">' +
          '<h3 style="margin:0 0 1rem">Keyboard Shortcuts</h3>' +
          '<table style="width:100%;border-collapse:collapse">' +
          '<tr><td><kbd>/</kbd></td><td>Focus search</td></tr>' +
          '<tr><td><kbd>g</kbd> <kbd>i</kbd></td><td>Go to Indicators</td></tr>' +
          '<tr><td><kbd>g</kbd> <kbd>a</kbd></td><td>Go to Admin panel</td></tr>' +
          '<tr><td><kbd>g</kbd> <kbd>l</kbd></td><td>Go to Logs</td></tr>' +
          '<tr><td><kbd>g</kbd> <kbd>d</kbd></td><td>Go to Dashboard</td></tr>' +
          '<tr><td><kbd>r</kbd></td><td>Refresh page</td></tr>' +
          '<tr><td><kbd>?</kbd></td><td>Show this help</td></tr>' +
          '<tr><td><kbd>Esc</kbd></td><td>Close / Blur</td></tr>' +
          '</table>' +
          '<button onclick="document.getElementById(\'kb-help-dialog\').style.display=\'none\'" style="margin-top:1rem;padding:.4rem 1rem;cursor:pointer">Close</button>' +
          '</div>';
        document.body.appendChild(overlay);
        overlay.addEventListener('click', function(e) { if (e.target === overlay) hideHelp(); });
      });
    })();
  </script>
</body>
</html>
