# docker-compose.yml (snippet)
services:
  nginx:
    image: nginx:alpine
    container_name: tfa-nginx
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-7003}:443"
    environment:
      - SSL_DOMAIN=${SSL_DOMAIN}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    restart: unless-stopped
